kind = "web"
previewPath = "/"
title = "Ferdrex Games Studio"
version = "1.0.0"
id = "artifacts/game-center"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 24192
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/game-center run dev"

[services.env]
PORT = "24192"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/game-center", "run", "build"]
publicDir = "artifacts/game-center/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
