<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background (full-bleed for maskable safe zone) -->
  <rect width="512" height="512" fill="#041504"/>
  <rect x="40" y="40" width="432" height="432" rx="40" fill="#020a02" stroke="#00FF00" stroke-width="6"/>
  <!-- Scanlines -->
  <g stroke="#00FF00" stroke-opacity="0.08" stroke-width="2">
    <line x1="60" y1="110" x2="452" y2="110"/>
    <line x1="60" y1="160" x2="452" y2="160"/>
    <line x1="60" y1="210" x2="452" y2="210"/>
    <line x1="60" y1="260" x2="452" y2="260"/>
    <line x1="60" y1="310" x2="452" y2="310"/>
    <line x1="60" y1="360" x2="452" y2="360"/>
    <line x1="60" y1="410" x2="452" y2="410"/>
  </g>
  <!-- Play triangle -->
  <path d="M212 176 L212 336 L344 256 Z" fill="#00FF00" filter="url(#glow)"/>
  <!-- Label -->
  <text x="256" y="432" text-anchor="middle" font-family="'Share Tech Mono', monospace" font-size="52" font-weight="bold" fill="#00FF00" filter="url(#glow)">DREX</text>
</svg>
